// Shim window.storage to use localStorage so the app persists state
// across sessions when deployed as a static site.
window.storage = {
  async get(key) {
    const v = localStorage.getItem(key);
    return v !== null ? { value: v } : null;
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { value };
  },
  async delete(key) {
    localStorage.removeItem(key);
    return { deleted: true };
  }
};

const SESSION_SIZE = 10;
const STORAGE_KEY = "hebrew_state_v1";

// ============================================================
// STORAGE HELPERS
// ============================================================
const defaultState = () => ({
  progress: {}, // { wordId: { seen, correct, streak, lastSeen } }
  stats: { xp: 0, streak: 0, lastDate: null, sessionsDone: 0 },
  settings: { cats: CATEGORIES.map((c) => c.id), mode: "type" },
});

async function loadState() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (r && r.value) return { ...defaultState(), ...JSON.parse(r.value) };
  } catch (e) {}
  return defaultState();
}

async function saveState(s) {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(s));
  } catch (e) {}
}

// Pick SESSION_SIZE words, weighted toward less-mastered
function buildQueue(words, progress) {
  const scored = words.map((w) => {
    const p = progress[w.id] || { seen: 0, correct: 0, streak: 0 };
    // Lower score = higher priority. New words are highest priority.
    const masteryScore = p.seen === 0 ? -100 : p.streak - Math.random() * 2;
    return { w, score: masteryScore };
  });
  scored.sort((a, b) => a.score - b.score);
  return scored.slice(0, SESSION_SIZE).map((s) => s.w);
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [loaded, setLoaded] = useState(false);
  const [state, setState] = useState(defaultState());
  const [view, setView] = useState("home"); // home | session | done
  const [queue, setQueue] = useState([]);
  const [qi, setQi] = useState(0);
  const [sessionResults, setSessionResults] = useState([]);

  useEffect(() => {
    loadState().then((s) => {
      setState(s);
      setLoaded(true);
    });
  }, []);

  // Persist whenever state changes (after initial load)
  useEffect(() => {
    if (loaded) saveState(state);
  }, [state, loaded]);

  const startSession = () => {
    const cats = new Set(state.settings.cats);
    const pool = WORDS.filter((w) => cats.has(w.cat));
    if (pool.length < 4) return;
    const q = buildQueue(pool, state.progress);
    setQueue(q);
    setQi(0);
    setSessionResults([]);
    setView("session");
  };

  const recordAnswer = (word, correct) => {
    setSessionResults((prev) => [...prev, { word, correct }]);
    setState((prev) => {
      const p = prev.progress[word.id] || { seen: 0, correct: 0, streak: 0 };
      const newP = {
        seen: p.seen + 1,
        correct: p.correct + (correct ? 1 : 0),
        streak: correct ? p.streak + 1 : 0,
        lastSeen: Date.now(),
      };
      const today = todayStr();
      const isNewDay = prev.stats.lastDate !== today;
      const dayGap =
        prev.stats.lastDate &&
        (new Date(today) - new Date(prev.stats.lastDate)) / 86400000;
      let newStreak = prev.stats.streak;
      if (isNewDay) {
        newStreak = dayGap === 1 ? newStreak + 1 : 1;
      }
      return {
        ...prev,
        progress: { ...prev.progress, [word.id]: newP },
        stats: {
          ...prev.stats,
          xp: prev.stats.xp + (correct ? 10 : 2),
          streak: newStreak,
          lastDate: today,
        },
      };
    });
  };

  const nextCard = () => {
    if (qi + 1 >= queue.length) {
      setState((prev) => ({
        ...prev,
        stats: { ...prev.stats, sessionsDone: prev.stats.sessionsDone + 1 },
      }));
      setView("done");
    } else {
      setQi(qi + 1);
    }
  };

  if (!loaded) return <LoadingView />;

  return (
    <div style={styles.appShell}>
      <GlobalStyles />
      <Header stats={state.stats} onHome={() => setView("home")} />
      <main style={styles.main}>
        {view === "home" && (
          <HomeView
            state={state}
            setState={setState}
            onStart={startSession}
          />
        )}
        {view === "session" && queue[qi] && (
          <SessionView
            key={queue[qi].id + qi}
            word={queue[qi]}
            progress={qi + 1}
            total={queue.length}
            mode={state.settings.mode}
            onAnswer={recordAnswer}
            onNext={nextCard}
          />
        )}
        {view === "done" && (
          <DoneView
            results={sessionResults}
            onHome={() => setView("home")}
            onAgain={startSession}
          />
        )}
      </main>
      <footer style={styles.footer}>
        עברית עסקית · Business Hebrew Practice
      </footer>
    </div>
  );
}

// ============================================================
// HOME VIEW
// ============================================================
function HomeView({ state, setState, onStart }) {
  const toggleCat = (id) => {
    setState((prev) => {
      const cats = new Set(prev.settings.cats);
      if (cats.has(id)) cats.delete(id);
      else cats.add(id);
      if (cats.size === 0) return prev;
      return {
        ...prev,
        settings: { ...prev.settings, cats: Array.from(cats) },
      };
    });
  };

  const setMode = (mode) => {
    setState((prev) => ({
      ...prev,
      settings: { ...prev.settings, mode },
    }));
  };

  // Compute mastery per category
  const masteryByCat = useMemo(() => {
    const result = {};
    CATEGORIES.forEach((c) => {
      const catWords = WORDS.filter((w) => w.cat === c.id);
      const mastered = catWords.filter((w) => {
        const p = state.progress[w.id];
        return p && p.streak >= 3;
      }).length;
      result[c.id] = { mastered, total: catWords.length };
    });
    return result;
  }, [state.progress]);

  const selectedCats = new Set(state.settings.cats);
  const poolSize = WORDS.filter((w) => selectedCats.has(w.cat)).length;

  return (
    <div style={styles.homeWrap}>
      <div style={styles.heroCard}>
        <div style={styles.heroEyebrow}>Session No. {state.stats.sessionsDone + 1}</div>
        <h1 style={styles.heroTitle}>
          <span style={styles.heroHebrew} dir="rtl">תרגול יומי</span>
          <span style={styles.heroDivider}>·</span>
          <span style={styles.heroEnglish}>Daily Drill</span>
        </h1>
        <p style={styles.heroSub}>
          Ten words, thirty seconds each. Professional vocabulary for the
          Tel Aviv boardroom.
        </p>
      </div>

      <section style={styles.section}>
        <h2 style={styles.sectionLabel}>Domain</h2>
        <div style={styles.catGrid}>
          {CATEGORIES.map((c) => {
            const active = selectedCats.has(c.id);
            const m = masteryByCat[c.id];
            const pct = (m.mastered / m.total) * 100;
            return (
              <button
                key={c.id}
                onClick={() => toggleCat(c.id)}
                style={{
                  ...styles.catCard,
                  ...(active ? styles.catCardActive : {}),
                }}
              >
                <div style={styles.catCardTop}>
                  <span style={styles.catLabel}>{c.label}</span>
                  <span style={styles.catHe} dir="rtl">{c.he}</span>
                </div>
                <div style={styles.catMeter}>
                  <div
                    style={{
                      ...styles.catMeterFill,
                      width: `${pct}%`,
                      background: active ? "var(--ink)" : "var(--muted)",
                    }}
                  />
                </div>
                <div style={styles.catMeta}>
                  {m.mastered} / {m.total} mastered
                </div>
              </button>
            );
          })}
        </div>
      </section>

      <section style={styles.section}>
        <h2 style={styles.sectionLabel}>Mode</h2>
        <div style={styles.modeRow}>
          <ModeOption
            id="type"
            title="Type"
            desc="Write in Hebrew from English prompt"
            active={state.settings.mode === "type"}
            onClick={() => setMode("type")}
          />
          <ModeOption
            id="flashcard"
            title="Flashcards"
            desc="Tap to flip, rate yourself"
            active={state.settings.mode === "flashcard"}
            onClick={() => setMode("flashcard")}
          />
        </div>
      </section>

      <button
        onClick={onStart}
        disabled={poolSize < 4}
        style={{
          ...styles.startBtn,
          ...(poolSize < 4 ? styles.startBtnDisabled : {}),
        }}
      >
        <span>Start session</span>
        <span style={styles.startBtnArrow}>→</span>
      </button>
    </div>
  );
}

function ModeOption({ title, desc, active, onClick }) {
  return (
    <button
      onClick={onClick}
      style={{
        ...styles.modeCard,
        ...(active ? styles.modeCardActive : {}),

      <div style={styles.modeCardDot}>
        {active && <div style={styles.modeCardDotInner} />}

        <div style={styles.modeCardDesc}>{desc}</div>
      </div>

      {mode === "flashcard" ? (
        <FlashcardCard

          revealed={false}
          onReveal={() => {}}
          onRate={(correct) => {
            onAnswer(word, correct);
            onNext();
          }}
        />
      ) : (
        <TypeCard word={word} onAnswer={onAnswer} onNext={onNext} />
      )}
    </div>
  );
}

// ============================================================
// TYPE CARD — English prompt, type Hebrew answer
// ============================================================
// Strips Hebrew diacritics (nikud) and normalizes whitespace so
// comparison works regardless of vowel points or extra spaces.
function normalizeHebrew(s) {
  return s
    .replace(/[\u0591-\u05C7]/g, "") // strip nikud / cantillation
    .replace(/\s+/g, " ")
    .trim();
}

function TypeCard({ word, onAnswer, onNext }) {
  const [input, setInput] = useState("");
  const [submitted, setSubmitted] = useState(null);
  const inputRef = useRef(null);

  useEffect(() => {
    inputRef.current?.focus();
  }, []);

  const handleSubmit = () => {
    if (submitted) return;
    if (!input.trim()) return;
    const correct = normalizeHebrew(input) === normalizeHebrew(word.he);
    setSubmitted({ correct });
    onAnswer(word, correct);
  };

  const handleShowAnswer = () => {
    if (submitted) return;
    setSubmitted({ correct: false, revealed: true });
    onAnswer(word, false);
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      if (submitted) onNext();
      else handleSubmit();
    }
  };

  // After submission the input is disabled and no longer receives
  // keyboard events, so attach a window-level Enter listener to
  // advance to the next card.
  useEffect(() => {
    if (!submitted) return;
    const onWindowKey = (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        onNext();
      }
    };
    window.addEventListener("keydown", onWindowKey);
    return () => window.removeEventListener("keydown", onWindowKey);
  }, [submitted, onNext]);

  return (
    <>
      <div style={styles.quizPrompt}>
        <div style={styles.quizPromptLabel}>Write in Hebrew</div>
        <div style={styles.quizPromptWord}>
          <span style={styles.quizEnglish}>{word.en}</span>
        </div>
      </div>

      <div style={styles.typeWrap}>
        <input
          ref={inputRef}
          type="text"
          dir="rtl"
          lang="he"
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={handleKeyDown}
          disabled={!!submitted}
          placeholder="…הקלד כאן"
          autoComplete="off"
          autoCorrect="off"
          autoCapitalize="off"
          spellCheck={false}
          style={{
            ...styles.typeInput,
            ...(submitted
              ? submitted.correct
                ? styles.typeInputCorrect
                : styles.typeInputWrong
              : {}),
          }}
        />
        {!submitted && (
          <div style={styles.typeBtnRow}>
            <button onClick={handleShowAnswer} style={styles.typeSkipBtn}>
              Show answer
            </button>
            <button
              onClick={handleSubmit}
              disabled={!input.trim()}
              style={{
                ...styles.typeSubmitBtn,
                ...(!input.trim() ? styles.typeSubmitBtnDisabled : {}),
              }}
            >
              Check →
            </button>
          </div>
        )}
      </div>

      {submitted && (
        <div style={styles.feedbackBar}>
          <div
            style={{
              ...styles.feedbackText,
              color: submitted.correct ? "var(--success)" : "var(--error)",
            }}
          >
            {submitted.correct ? "נכון" : "Not quite"}
            {!submitted.correct && (
              <span style={styles.feedbackAnswer}>
                {" — "}
                <span dir="rtl">{word.he}</span>
              </span>
            )}
          </div>
          <button onClick={onNext} style={styles.nextBtn}>
            Continue →
          </button>
        </div>
      )}
    </>
  );
}

// ============================================================
// DONE VIEW
// ============================================================
function DoneView({ results, onHome, onAgain }) {
  const correct = results.filter((r) => r.correct).length;
  const total = results.length;
  const pct = Math.round((correct / total) * 100);

  return (
    <div style={styles.doneWrap}>
      <div style={styles.doneEyebrow}>Session complete</div>
      <div style={styles.doneScore}>{pct}%</div>
      <div style={styles.doneDetail}>
        {correct} of {total} correct · +{correct * 10 + (total - correct) * 2} XP
      </div>

      <div style={styles.doneList}>
        {results.map((r, i) => (
          <div key={i} style={styles.doneRow}>
            <span
              style={{
                ...styles.doneDot,
                background: r.correct ? "var(--success)" : "var(--error)",
              }}
            />
            <span style={styles.doneHe} dir="rtl">
              {r.word.he}
            </span>
            <span style={styles.doneEn}>{r.word.en}</span>
          </div>
        ))}
      </div>

      <div style={styles.doneBtns}>
        <button onClick={onHome} style={styles.doneBtnSecondary}>
          Back
        </button>
        <button onClick={onAgain} style={styles.doneBtnPrimary}>
          Another round →
        </button>
      </div>
    </div>
  );
}
