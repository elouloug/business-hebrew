// Shim window.storage to use localStorage so the app persists state
// across sessions when deployed as a static site.
window.storage = {
  async get(key) {
    const v = localStorage.getItem(key);
    return v !== null ? { value: v } : null;
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { value };
  },
  async delete(key) {
    localStorage.removeItem(key);
    return { deleted: true };
  }
};

const SESSION_SIZE = 10;
const STORAGE_KEY = "hebrew_state_v1";

// ============================================================
// STORAGE HELPERS
// ============================================================
const defaultState = () => ({
  progress: {}, // { wordId: { seen, correct, streak, lastSeen } }
  stats: { xp: 0, streak: 0, lastDate: null, sessionsDone: 0 },
  settings: { cats: CATEGORIES.map((c) => c.id), mode: "type" },
  customWords: [], // user-added words, same shape as WORDS entries
});

async function loadState() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (r && r.value) return { ...defaultState(), ...JSON.parse(r.value) };
  } catch (e) {}
  return defaultState();
}

async function saveState(s) {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(s));
  } catch (e) {}
}

// Pick SESSION_SIZE words, weighted toward less-mastered
function buildQueue(words, progress) {
  const scored = words.map((w) => {
    const p = progress[w.id] || { seen: 0, correct: 0, streak: 0 };
    // Lower score = higher priority. New words are highest priority.
    const masteryScore = p.seen === 0 ? -100 : p.streak - Math.random() * 2;
    return { w, score: masteryScore };
  });
  scored.sort((a, b) => a.score - b.score);
  return scored.slice(0, SESSION_SIZE).map((s) => s.w);
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

// MAIN APP
// ============================================================
function App() {
  const [loaded, setLoaded] = useState(false);
  const [state, setState] = useState(defaultState());
  const [view, setView] = useState("home"); // home | session | done
  const [queue, setQueue] = useState([]);
  const [qi, setQi] = useState(0);
  const [sessionResults, setSessionResults] = useState([]);

  useEffect(() => {
    loadState().then((s) => {
      setState(s);
      setLoaded(true);
    });
  }, []);

  // Persist whenever state changes (after initial load)
  useEffect(() => {
    if (loaded) saveState(state);
  }, [state, loaded]);

  // Combine built-in words with user's custom words
  const allWords = useMemo(
    () => [...WORDS, ...(state.customWords || [])],
    [state.customWords]
  );

  const startSession = () => {
    const cats = new Set(state.settings.cats);
    const pool = allWords.filter((w) => cats.has(w.cat));
    if (pool.length < 4) return;
    const q = buildQueue(pool, state.progress);
    setQueue(q);
    setQi(0);
    setSessionResults([]);
    setView("session");
  };

  const startChallengeSession = () => {
    const challenges = allWords.filter((w) => {
      const p = state.progress[w.id];
      return p && p.inChallenges;
    });
    if (challenges.length === 0) return;
    // Shuffle and cap at SESSION_SIZE
    const shuffled = [...challenges].sort(() => Math.random() - 0.5);
    const q = shuffled.slice(0, SESSION_SIZE);
    setQueue(q);
    setQi(0);
    setSessionResults([]);
    setView("session");
  };

  const addCustomWord = (he, en, cat) => {
    const heTrim = (he || "").trim();
    const enTrim = (en || "").trim();
    if (!heTrim || !enTrim || !cat) return;
    setState((prev) => ({
      ...prev,
      customWords: [
        ...(prev.customWords || []),
        {
          id: "cw_" + Math.random().toString(36).slice(2, 10),
          he: heTrim,
          en: enTrim,
          cat,
        },
      ],
    }));
  };

  const deleteCustomWord = (id) => {
    setState((prev) => {
      const newProgress = { ...prev.progress };
      delete newProgress[id];
      return {
        ...prev,
        progress: newProgress,
        customWords: (prev.customWords || []).filter((w) => w.id !== id),
      };
    });
  };

  const recordAnswer = (word, correct) => {
    setSessionResults((prev) => [...prev, { word, correct }]);
    setState((prev) => {
      const p = prev.progress[word.id] || {
        seen: 0,
        correct: 0,
        streak: 0,
        missStreak: 0,
        inChallenges: false,
      };
      const nextWordStreak = correct ? (p.streak || 0) + 1 : 0;
      const nextMissStreak = correct ? 0 : (p.missStreak || 0) + 1;
      let nextInChallenges = p.inChallenges || false;
      // Enter challenges on any wrong answer
      if (!correct) nextInChallenges = true;
      // Exit challenges when right 3 in a row while in challenges
      if (nextInChallenges && nextWordStreak >= 3) nextInChallenges = false;

      const newP = {
        seen: p.seen + 1,
        correct: p.correct + (correct ? 1 : 0),
        streak: nextWordStreak,
        missStreak: nextMissStreak,
        inChallenges: nextInChallenges,
        lastSeen: Date.now(),
      };
      const today = todayStr();
      const isNewDay = prev.stats.lastDate !== today;
      const dayGap =
        prev.stats.lastDate &&
        (new Date(today) - new Date(prev.stats.lastDate)) / 86400000;
      let newDayStreak = prev.stats.streak;
      if (isNewDay) {
        newDayStreak = dayGap === 1 ? newDayStreak + 1 : 1;
      }
      return {
        ...prev,
        progress: { ...prev.progress, [word.id]: newP },
        stats: {
          ...prev.stats,
          xp: prev.stats.xp + (correct ? 10 : 2),
          streak: newDayStreak,
          lastDate: today,
        },
      };
    });
  };

  const nextCard = () => {
    if (qi + 1 >= queue.length) {
      setState((prev) => ({
        ...prev,
        stats: { ...prev.stats, sessionsDone: prev.stats.sessionsDone + 1 },
      }));
      setView("done");
    } else {
      setQi(qi + 1);
    }
  };

  if (!loaded) return <LoadingView />;

  return (
    <div style={styles.appShell}>
      <GlobalStyles />
      <Header stats={state.stats} onHome={() => setView("home")} />
      <main style={styles.main}>
        {view === "home" && (
          <HomeView
            state={state}
            setState={setState}
            allWords={allWords}
            onStart={startSession}
            onStartChallenge={startChallengeSession}
            onOpenWordBank={() => setView("wordbank")}
          />
        )}
        {view === "wordbank" && (
          <WordBankView
            customWords={state.customWords || []}
            onAdd={addCustomWord}
            onDelete={deleteCustomWord}
            onBack={() => setView("home")}
          />
        )}
        {view === "session" && queue[qi] && (
          <SessionView
            key={queue[qi].id + qi}
            word={queue[qi]}
            progress={qi + 1}
            total={queue.length}
            mode={state.settings.mode}
            onAnswer={recordAnswer}
            onNext={nextCard}
          />
        )}
        {view === "done" && (
          <DoneView
            results={sessionResults}
            onHome={() => setView("home")}
            onAgain={startSession}
          />
        )}
      </main>
      <footer style={styles.footer}>
        עברית עסקית · Business Hebrew Practice
      </footer>
    </div>
  );
}

function HomeView({ state, setState, allWords, onStart, onStartChallenge, onOpenWordBank }) {
  const toggleCat = (id) => {
    setState((prev) => {
      const cats = new Set(prev.settings.cats);
      if (cats.has(id)) cats.delete(id);
      else cats.add(id);
      if (cats.size === 0) return prev;
      return {
        ...prev,
        settings: { ...prev.settings, cats: Array.from(cats) },
      };
    });
  };

  const setMode = (mode) => {
    setState((prev) => ({
      ...prev,
      settings: { ...prev.settings, mode },
    }));
  };

  // Count words currently flagged as challenging
  const challengeCount = useMemo(() => {
    return allWords.filter((w) => {
      const p = state.progress[w.id];
      return p && p.inChallenges;
    }).length;
  }, [state.progress, allWords]);

  // Compute mastery per category
  const masteryByCat = useMemo(() => {
    const result = {};
    CATEGORIES.forEach((c) => {
      const catWords = allWords.filter((w) => w.cat === c.id);
      const mastered = catWords.filter((w) => {
        const p = state.progress[w.id];
        return p && p.streak >= 3;
      }).length;
      result[c.id] = { mastered, total: catWords.length };
    });
    return result;
  }, [state.progress, allWords]);

  const selectedCats = new Set(state.settings.cats);
  const poolSize = allWords.filter((w) => selectedCats.has(w.cat)).length;

  return (
    <div style={styles.homeWrap}>
      <div style={styles.heroCard}>
        <div style={styles.heroEyebrow}>Session No. {state.stats.sessionsDone + 1}</div>
        <h1 style={styles.heroTitle}>
          <span style={styles.heroHebrew} dir="rtl">תרגול יומי</span>
          <span style={styles.heroDivider}>·</span>
          <span style={styles.heroEnglish}>Daily Drill</span>
        </h1>
        <p style={styles.heroSub}>
          Ten words, thirty seconds each. Professional vocabulary for the
          Tel Aviv boardroom.
        </p>
      </div>

      {challengeCount > 0 && (
        <button onClick={onStartChallenge} style={styles.challengeCard}>
          <div style={styles.challengeLeftCol}>
            <div style={styles.challengeEyebrow}>
              <span dir="rtl">מילים מאתגרות</span>
              <span style={styles.challengeDot}>·</span>
              <span>Challenges</span>
            </div>
            <div style={styles.challengeTitle}>
              {challengeCount} {challengeCount === 1 ? "word" : "words"} to drill
            </div>
            <div style={styles.challengeDesc}>
              Words you missed. Get each right three times in a row to clear it.
            </div>
          </div>
          <div style={styles.challengeArrow}>→</div>
        </button>
      )}

      <section style={styles.section}>
        <h2 style={styles.sectionLabel}>Domain</h2>
        <div style={styles.catGrid}>
          {CATEGORIES.map((c) => {
            const active = selectedCats.has(c.id);
            const m = masteryByCat[c.id];
            const pct = (m.mastered / m.total) * 100;
            return (
              <button
                key={c.id}
                onClick={() => toggleCat(c.id)}
                style={{
                  ...styles.catCard,
                  ...(active ? styles.catCardActive : {}),
                }}
              >
                <div style={styles.catCardTop}>
                  <span style={styles.catLabel}>{c.label}</span>
                  <span style={styles.catHe} dir="rtl">{c.he}</span>
                </div>
                <div style={styles.catMeter}>
                  <div
                    style={{
                      ...styles.catMeterFill,
                      width: `${pct}%`,
                      background: active ? "var(--ink)" : "var(--muted)",
                    }}
                  />
                </div>
                <div style={styles.catMeta}>
                  {m.mastered} / {m.total} mastered
                </div>
              </button>
            );
          })}
        </div>
      </section>

      <section style={styles.section}>
        <h2 style={styles.sectionLabel}>Mode</h2>
        <div style={styles.modeRow}>
          <ModeOption
            id="type"
            title="Type"

// ============================================================
// TYPE CARD — English prompt, type Hebrew answer
// ============================================================
// Strips Hebrew diacritics (nikud) and normalizes whitespace so
// comparison works regardless of vowel points or extra spaces.
function normalizeHebrew(s) {
  return s
    .replace(/[\u0591-\u05C7]/g, "") // strip nikud / cantillation
    .replace(/[\u05F3\u05F4]/g, "") // strip geresh, gershayim
    .replace(/["'׳״]/g, "") // strip common quote-like marks
    .replace(/\s+/g, " ")
    .trim();
}

function TypeCard({ word, onAnswer, onNext }) {
  const [input, setInput] = useState("");
  const [submitted, setSubmitted] = useState(null);
  const inputRef = useRef(null);

  useEffect(() => {
    inputRef.current?.focus();
  }, []);

  const handleSubmit = () => {
    if (submitted) return;
    if (!input.trim()) return;
    const correct = normalizeHebrew(input) === normalizeHebrew(word.he);
    setSubmitted({ correct });
    onAnswer(word, correct);
  };

  const handleShowAnswer = () => {
    if (submitted) return;
    setSubmitted({ correct: false, revealed: true });
    onAnswer(word, false);
  };

  const handleKeyDown = (e) => {
    if (e.key !== "Enter") return;
    e.preventDefault();
    if (submitted) {
      onNext();
    } else if (input.trim()) {
      handleSubmit();
    }
  };

  return (
    <>
      <div style={styles.quizPrompt}>
        <div style={styles.quizPromptLabel}>Write in Hebrew</div>
        <div style={styles.quizPromptWord}>
          <span style={styles.quizEnglish}>{word.en}</span>
        </div>
      </div>

      <div style={styles.typeWrap}>
        <input
          ref={inputRef}
          type="text"
          dir="rtl"
          lang="he"
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={handleKeyDown}
          readOnly={!!submitted}
          placeholder="…הקלד כאן"
          autoComplete="off"
          autoCorrect="off"
          autoCapitalize="off"
          spellCheck={false}
          style={{
            ...styles.typeInput,
            ...(submitted
              ? submitted.correct
                ? styles.typeInputCorrect
                : styles.typeInputWrong
              : {}),
          }}
        />
        {!submitted && (
          <div style={styles.typeBtnRow}>
            <button onClick={handleShowAnswer} style={styles.typeSkipBtn}>
              Show answer
            </button>
            <button
              onClick={handleSubmit}
              disabled={!input.trim()}
              style={{
                ...styles.typeSubmitBtn,
                ...(!input.trim() ? styles.typeSubmitBtnDisabled : {}),
              }}
            >
              Check →
            </button>
          </div>
        )}
      </div>

      {submitted && (
        <div style={styles.feedbackBar}>
          <div
            style={{
              ...styles.feedbackText,
              color: submitted.correct ? "var(--success)" : "var(--error)",
            }}
          >
            {submitted.correct ? "נכון" : "Not quite"}
            {!submitted.correct && (
              <span style={styles.feedbackAnswer}>
                {" — "}
                <span dir="rtl">{word.he}</span>
              </span>
            )}
          </div>
          <button onClick={onNext} style={styles.nextBtn}>
            Continue →
          </button>
        </div>
      )}
    </>
  );
}
